<form [formGroup]="form" (ngSubmit)="submit()" [@formEnter] novalidate>

  @if (errorMessage()) {
    <div class="auth-error" role="alert">{{ errorMessage() }}</div>
  }

  <!-- Email -->
  <div class="auth-field-group">
    <label class="auth-field-label" for="login-email">Email</label>
    <input
      id="login-email"
      formControlName="email"
      type="email"
      placeholder="you@example.com"
      autocomplete="email"
      class="auth-input"
      [class.auth-input--error]="form.get('email')?.invalid && form.get('email')?.touched"
      aria-describedby="login-email-err"
    />
    @if (form.get('email')?.invalid && form.get('email')?.touched) {
      <p id="login-email-err" class="auth-field-error" role="alert">
        Please enter a valid email address.
      </p>
    }
  </div>

  <!-- Password -->
  <div class="auth-field-group">
    <div class="auth-label-row">
      <label class="auth-field-label" for="login-password">Password</label>
      <a routerLink="." class="auth-forgot-link" aria-label="Forgot your password">
        Forgot password?
      </a>
    </div>
    <div class="auth-input-wrap">
      <input
        id="login-password"
        formControlName="password"
        [type]="showPassword() ? 'text' : 'password'"
        placeholder="••••••••"
        autocomplete="current-password"
        class="auth-input auth-input--with-action"
        [class.auth-input--error]="form.get('password')?.invalid && form.get('password')?.touched"
        aria-describedby="login-pwd-err"
      />
      <button
        type="button"
        class="auth-input-action"
        (click)="showPassword.set(!showPassword())"
        [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
      >
        <ng-icon [name]="showPassword() ? 'lucideEyeOff' : 'lucideEye'" size="16" />
      </button>
    </div>
    @if (form.get('password')?.invalid && form.get('password')?.touched) {
      <p id="login-pwd-err" class="auth-field-error" role="alert">Password is required.</p>
    }
  </div>

  <!-- CTA -->
  <button type="submit" class="auth-btn-primary" [disabled]="isSubmitting()">
    @if (isSubmitting()) {
      <span class="auth-spinner" aria-hidden="true"></span>
      <span>Signing in…</span>
    } @else {
      Sign in
    }
  </button>

  <!-- Divider -->
  <div class="auth-divider" role="separator" aria-hidden="true">
    <span>OR CONTINUE WITH</span>
  </div>

  <!-- Google -->
  <button type="button" class="auth-btn-social">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
         width="18" height="18" aria-hidden="true" focusable="false">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04
               2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71
               1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43
               8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7
               1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

</form>
